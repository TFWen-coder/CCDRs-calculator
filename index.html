<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCDR 狗狗認知障礙分數計算機</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="glass-container">
        <header>
            <h1>CCDR 狗狗認知障礙分數計算機</h1>
            <p>透過 13 個簡單的問題，快速評估狗狗是否有認知障礙（CCD）的風險。</p>
        </header>

        <form id="ccdrForm">
            <!-- Profile Section -->
            <section class="form-section profile-section">
                <h2>飼主與狗狗基本資料</h2>
                <div class="input-group">
                    <label for="dogAge">狗狗年齡 (歲)</label>
                    <input type="number" id="dogAge" name="dogAge" min="0" max="30" required placeholder="例如：12">
                </div>
                <div class="input-group">
                    <label for="ownerCity">居住縣市</label>
                    <select id="ownerCity" name="ownerCity" required>
                        <option value="" disabled selected>請選擇縣市</option>
                        <option value="基隆市">基隆市</option>
                        <option value="台北市">台北市</option>
                        <option value="新北市">新北市</option>
                        <option value="桃園市">桃園市</option>
                        <option value="新竹市">新竹市</option>
                        <option value="新竹縣">新竹縣</option>
                        <option value="苗栗縣">苗栗縣</option>
                        <option value="台中市">台中市</option>
                        <option value="彰化縣">彰化縣</option>
                        <option value="南投縣">南投縣</option>
                        <option value="雲林縣">雲林縣</option>
                        <option value="嘉義市">嘉義市</option>
                        <option value="嘉義縣">嘉義縣</option>
                        <option value="台南市">台南市</option>
                        <option value="高雄市">高雄市</option>
                        <option value="屏東縣">屏東縣</option>
                        <option value="宜蘭縣">宜蘭縣</option>
                        <option value="花蓮縣">花蓮縣</option>
                        <option value="台東縣">台東縣</option>
                        <option value="澎湖縣">澎湖縣</option>
                        <option value="金門縣">金門縣</option>
                        <option value="連江縣">連江縣</option>
                    </select>
                </div>
            </section>

            <!-- Questionnaire Section -->
            <section class="form-section questions-section">
                <h2>行為評估問卷</h2>
                <p class="section-desc">請根據狗狗過去六個月內的行為頻率與改變來作答。</p>
                
                <div id="questionsContainer"></div>
            </section>

            <button type="submit" class="submit-btn">計算分數</button>
        </form>

        <!-- Results Panel (Hidden initially) -->
        <div id="resultsPanel" class="results-panel hidden">
            <button id="closeResults" class="close-btn">&times;</button>
            <div class="results-header">
                <h2>評估結果</h2>
                <div class="score-display">
                    <span id="totalScore">0</span> 分
                </div>
                <div id="riskLevel" class="risk-level"></div>
                <p id="riskDescription"></p>
            </div>

            <div class="stats-section">
                <h3>數據統計與分布</h3>
                <p class="stats-desc">來看看與您狗狗年齡相近或同地區的毛孩情況吧！</p>
                
                <div class="charts-grid">
                    <div class="chart-container">
                        <canvas id="severityChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <canvas id="ageChart"></canvas>
                    </div>
                    <div class="chart-container wide">
                        <canvas id="regionChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
